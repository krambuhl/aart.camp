name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ${{ matrix.task }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [lint, build, vitest, e2e]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Lint (biome)
        if: matrix.task == 'lint'
        run: npm run lint

      - name: Build (next, includes typecheck)
        if: matrix.task == 'build'
        run: npm run build

      - name: Vitest — application
        if: matrix.task == 'vitest'
        run: npm test

      - name: Vitest — agentic substrate
        if: matrix.task == 'vitest'
        run: npm run test:agentic

      - name: Install Playwright browsers
        if: matrix.task == 'e2e'
        run: npx playwright install --with-deps chromium

      - name: Build Storybook
        if: matrix.task == 'e2e'
        run: npm run build-storybook

      - name: Playwright tests
        if: matrix.task == 'e2e'
        run: npx playwright test

      - name: Upload Playwright report
        if: failure() && matrix.task == 'e2e'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore
