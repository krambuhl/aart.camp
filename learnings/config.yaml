# Single source of truth for the learnings panel composition,
# consensus thresholds, and operational knobs. The /griot-compact
# skill reads this at startup and dispatches subagents accordingly.
# Edit here, not in scripts.

# ─── Judge panel ────────────────────────────────────────────────────────────
# Four stateless griot-judge subagents per panel round, dispatched in
# parallel by /griot-compact via the Agent tool. The tool's `model`
# parameter accepts tier names only (opus / sonnet / haiku); specific
# version pinning is intentionally not supported in the subagent path.
# Composition (2 Opus / 1 Sonnet / 1 Haiku) keeps tier diversity while
# matching the smaller pooled-token budget.
judges:
  - id: opus-A
    tier: opus
  - id: opus-B
    tier: opus
  - id: sonnet
    tier: sonnet
  - id: haiku
    tier: haiku

# ─── Other griot subagents ──────────────────────────────────────────────────
# Per-role tier assignments for the non-judge griot agents. The
# orchestrator passes tier as the Agent tool's `model` override at spawn
# time. max_tokens and other harness concerns are owned by the subagent
# definition under .claude/agents/, not by config.
agents:
  rubric_author:
    tier: opus
  rewriter:
    tier: opus
  debate_summarizer:
    # The LLM slice of what used to be "mediator". Summarises the prior
    # round's per-judge verdicts into a brief the next round sees.
    tier: sonnet
  operator:
    tier: opus

# ─── Test subject ───────────────────────────────────────────────────────────
# Tier used to generate control (no rollup) and treatment (with candidate
# learning injected) outputs that the judge panel compares. Pick the tier
# that best represents "the Claude your users actually use."
test_subject:
  tier: opus

# ─── Consensus thresholds ───────────────────────────────────────────────────
# Two rounds. Round 1 starts blind; round 2 sees a debate-summarizer brief
# of the prior round's per-judge verdicts. If round 2 fails to reach 3/4
# and the panel is split 2-2 with both Opus judges agreeing, the Opus
# verdict wins (see `tiebreak` below). Otherwise the case escalates to
# the operator for stuck-learning diagnosis.
consensus:
  round_1_blind: 4        # 4/4 unanimous required
  round_2_debate: 3       # 3/4 supermajority required; below → tiebreak / operator

# ─── Tiebreak ───────────────────────────────────────────────────────────────
# Applies only when round 2 finishes without reaching the supermajority
# threshold AND the panel is exactly split. The named top tier's judges
# must agree unanimously among themselves; their shared verdict wins.
# If they disagree, no tiebreak fires and the case goes to operator.
tiebreak:
  rule: top_tier_consensus
  top_tier: opus

# ─── Rewrite loop ───────────────────────────────────────────────────────────
rewrite:
  max_attempts: 5

# ─── Kill-switch / alert thresholds (info-only, not enforced in code) ───────
alerts:
  did_not_reproduce_rate_max: 0.30   # >30% means benchmark is theatre
  operator_interventions_per_run_max: 3

# ─── Paths (relative to repo root) ──────────────────────────────────────────
paths:
  root: learnings
  session_notes: learnings/session-notes
  archived: learnings/session-notes/archived
  nightly: learnings/nightly
  runs: learnings/runs
  rollup: learnings/rollup.json
  citations: learnings/citations.json
  regressions: learnings/regressions.jsonl
  bench_history: learnings/bench-history.jsonl
  sessions: learnings/sessions.jsonl
  operator_log: learnings/operator-log.jsonl
  judge_calibration: learnings/judge-calibration.json
  pr_templates: learnings/pr-templates
